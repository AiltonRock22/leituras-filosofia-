<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leituras de Filosofia - Prof. Ailton</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background-color: #e9ecef;
            color: #333;
        }

        header {
            background: #1a252f;
            color: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Cartão do Material */
        .card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.2s;
            border: 1px solid #dee2e6;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        /* Área da Miniatura */
        .thumb-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: #f8f9fa;
            border-bottom: 2px solid #3498db;
        }

        .thumb-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Faz a imagem preencher o espaço */
        }

        .content {
            padding: 20px;
            text-align: center;
        }

        .content h3 {
            margin: 0 0 15px;
            color: #2c3e50;
            font-size: 1.3rem;
        }

        .btn {
            display: block;
            background: #3498db;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
        }

        .btn:hover {
            background: #217dbb;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
    </style>
</head>
<body>

<header>
    <h1>Material Didático de Filosofia</h1>
    <p>Escola Estadual Felício Pereira de Araújo</p>
</header>

<div class="container">
    <div class="grid">

        <div class="card">
            <div class="thumb-container">
                <img src="https://drive.google.com/thumbnail?id=1pCItDPeQjQ3yzgQ9dJGLtay5JCLgb6Dj&sz=w500" alt="Capa Cap 11">
            </div>
            <div class="content">
                <h3>Capítulo 11</h3>
                <a href="https://drive.google.com/file/d/1pCItDPeQjQ3yzgQ9dJGLtay5JCLgb6Dj/view" target="_blank" class="btn">Abrir Leitura</a>
            </div>
        </div>

        <div class="card">
            <div class="thumb-container">
                <img src="https://drive.google.com/thumbnail?id=192K3-Kk_GD3ZON7IBL7R9wwxz9Y3QeK0&sz=w500" alt="Capa Cap 12">
            </div>
            <div class="content">
                <h3>Capítulo 12</h3>
                <a href="https://drive.google.com/file/d/192K3-Kk_GD3ZON7IBL7R9wwxz9Y3QeK0/view" target="_blank" class="btn">Abrir Leitura</a>
            </div>
        </div>

    </div>
</div>

<footer>
    <p>Organizado pelo Professor Ailton Carlos S. Mota &copy; 2026</p>
</footer>

</body>
</html>
